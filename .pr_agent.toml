# Qodo Merge / Qodo Code Review (bot: qodo-code-review) configuration.
# Repo-specific coding standards live in best_practices.md (this bot does NOT read AGENTS.md).
[github_app]
pr_commands = [
    "/agentic_describe",
    "/agentic_review",
]

[pr_reviewer]
require_score_review = false
require_tests_review = true
require_security_review = true
num_code_suggestions = 6
inline_code_comments = true
extra_instructions = """
This is a CLI-first Go 1.25 project (Impartus CLI). The canonical review guide is REVIEW.md at the repo root. Focus review on:
- Security: never log passwords, bearer tokens, cookies, or full config; .token must stay mode 0600; flag any new /api/v1 endpoint lacking auth middleware.
- Concurrency: download/decrypt/pipeline workers and job execution must honor context cancellation (ctx.Done()).
- Errors: wrap with fmt.Errorf and %w; no silently discarded errors.
- Tests: new behavior needs table-driven tests; coverage gate is 40%.
- Conventions: keep initialisms uppercase (ID/URL/HTTP/JSON/API); cyclomatic <= 15, cognitive <= 30, funlen <= 100 lines.
Only flag issues introduced or touched by the PR diff.
"""

[review_agent]
comments_location_policy = "both"
inline_comments_severity_threshold = 2
issues_user_guidelines = """
CLI --start/--end are 1-based inclusive; verify API job index translation is consistent rather than assumed.
Normalize view aliases (first/second vs left/right) at module boundaries.
Running/pending jobs at shutdown are restored as failed (non-resumable) - do not claim resumability.
Handle FFmpeg/mpv being absent from PATH gracefully.
"""

[pr_code_suggestions]
num_code_suggestions = 6

[best_practices]
organization_name = "impartus-cli"
enable_global_best_practices = false
