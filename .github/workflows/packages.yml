name: Packages

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  publish-ghcr:
    name: Publish GHCR Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Prepare image variables
        id: vars
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_DATE: ${{ github.event.release.published_at }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            VERSION="$RELEASE_TAG"
            VERSION="${VERSION#v}"
            BUILD_DATE="$RELEASE_DATE"
          else
            VERSION="main"
            BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.event_name == 'push' }}
            type=sha,format=short,prefix=sha-,enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
          labels: |
            org.opencontainers.image.title=impartus-cli
            org.opencontainers.image.description=CLI and HTTP API for downloading Impartus lecture recordings.
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build multi-platform OCI image for security gate
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: impartus:prepublish-scan
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=oci,dest=/tmp/impartus-image,tar=false
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
            COMMIT=${{ github.sha }}

      - name: Scan linux/amd64 image before publish
        id: scan_amd64
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          scan-type: 'image'
          input: '/tmp/impartus-image'
          scanners: 'vuln'
          format: 'sarif'
          output: 'trivy-image-amd64-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan linux/arm64 image before publish
        id: scan_arm64
        if: ${{ always() && steps.build.outcome == 'success' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          scan-type: 'image'
          input: '/tmp/impartus-image'
          scanners: 'vuln'
          format: 'sarif'
          output: 'trivy-image-arm64-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'
          ignore-unfixed: true
          skip-setup-trivy: true

      - name: Upload linux/amd64 Trivy SARIF results
        if: ${{ always() && github.event.repository.security_and_analysis.advanced_security.status == 'enabled' }}
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: trivy-image-amd64-results.sarif
          category: trivy-image-amd64

      - name: Upload linux/arm64 Trivy SARIF results
        if: ${{ always() && github.event.repository.security_and_analysis.advanced_security.status == 'enabled' }}
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: trivy-image-arm64-results.sarif
          category: trivy-image-arm64

      - name: Upload Trivy image reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-image-results
          path: |
            trivy-image-amd64-results.sarif
            trivy-image-arm64-results.sarif
          if-no-files-found: warn
          retention-days: 30

      - name: Set up ORAS
        id: oras
        if: ${{ always() && steps.scan_amd64.outcome == 'success' && steps.scan_arm64.outcome == 'success' }}
        uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d # v2.0.1
        with:
          version: 1.3.2

      - name: Log in to GHCR
        id: login
        if: ${{ always() && steps.scan_amd64.outcome == 'success' && steps.scan_arm64.outcome == 'success' && steps.oras.outcome == 'success' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish scanned multi-platform OCI image
        id: publish
        if: ${{ always() && steps.scan_amd64.outcome == 'success' && steps.scan_arm64.outcome == 'success' && steps.oras.outcome == 'success' && steps.login.outcome == 'success' }}
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          mapfile -t image_refs <<< "$IMAGE_TAGS"
          if [[ ${#image_refs[@]} -eq 0 || -z "${image_refs[0]}" ]]; then
            echo "No image tags were generated" >&2
            exit 1
          fi

          expected_prefix="${IMAGE_NAME}:"
          destination="${image_refs[0]}"
          if [[ "$destination" != "$expected_prefix"* ]]; then
            echo "Unexpected image reference: $destination" >&2
            exit 1
          fi

          for image_ref in "${image_refs[@]:1}"; do
            if [[ "$image_ref" != "$expected_prefix"* ]]; then
              echo "Unexpected image reference: $image_ref" >&2
              exit 1
            fi
            destination+=",${image_ref#"$expected_prefix"}"
          done

          oras cp --from-oci-layout /tmp/impartus-image:prepublish-scan "$destination"

          local_digest="$(oras resolve --oci-layout /tmp/impartus-image:prepublish-scan)"
          published_digest="$(oras resolve "${image_refs[0]}")"
          if [[ "$local_digest" != "$published_digest" ]]; then
            echo "Published digest does not match the scanned OCI image" >&2
            exit 1
          fi
