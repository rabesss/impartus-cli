name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  review:
    name: PR Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run golangci-lint with reviewdog
        uses: reviewdog/action-golangci-lint@c76cceaaab89abe74e649d2e34c6c9adc26662d2 # v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          golangci_lint_version: v2.12.1
          golangci_lint_flags: "--config=.golangci.yml --timeout=5m"
          reporter: github-pr-review
          filter_mode: diff_context
          fail_level: error

      - name: Check for TODO/FIXME tech debt
        run: |
          echo "## Tech Debt Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TODOS=$(grep -r --include="*.go" -l "TODO:\|FIXME:\|BUG:\|HACK:" . 2>/dev/null | grep -v vendor | head -20 || true)
          if [ -n "$TODOS" ]; then
            echo "Files with tech debt markers:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$TODOS" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "No tech debt markers found." >> $GITHUB_STEP_SUMMARY
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.1
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests with coverage
        run: |
          gotestsum --format=short-verbose --jsonfile=test-results.json -- -cover -coverprofile=coverage.out -timeout 5m ./...
          
          # Extract and display coverage summary
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tail -1 >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Show test timing from JSON results
          echo "### Test Timing" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          jq -r 'select(.Action=="pass" or .Action=="fail") | "\(.Test // .Package) \(.Action) \(.Elapsed)s"' test-results.json 2>/dev/null | head -30 >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          # Enforce minimum coverage threshold (40%)
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 40" | bc)" -eq 1 ]; then
            echo "::warning::Coverage ${COVERAGE}% is below 40% threshold"
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.out
          flags: unittests
          name: impartus-cli-coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Run go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  container-permissions:
    name: Container permissions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build local image
        run: docker build -t impartus:permission-test .

      - name: Verify non-root writable runtime
        run: |
          docker run --rm --entrypoint sh impartus:permission-test -c \
            'test "$(id -u)" -ne 0 && touch /work/.jobs.json.tmp && mkdir -p /work/temp /work/downloads && test -w /work -a -w /work/temp -a -w /work/downloads'

      - name: Verify CLI entrypoint
        run: docker run --rm impartus:permission-test --help

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: go build -o impartus .

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install desloppify
        run: python3 -m pip install --user --upgrade "desloppify[full]==0.9.12" "tree-sitter-language-pack==1.6.2"

      - name: Run desloppify quality gate
        id: desloppify
        run: |
          # Run desloppify scan and capture output. The scan may exit non-zero
          # when it finds quality issues; keep the job alive long enough to
          # print the report and apply the threshold policy below.
          set +e
          OUTPUT=$(desloppify scan --path . 2>&1)
          SCAN_EXIT=$?
          set -e
          echo "$OUTPUT"

          # Extract overall score from output
          # Look for patterns like "Overall Score: XX/100" or "Score: XX"
          SCORE=$(echo "$OUTPUT" | grep -i "overall" | grep -oE "[0-9]+(\.[0-9]+)?/100" | head -1 | cut -d'/' -f1)
          if [ -z "$SCORE" ]; then
            SCORE=$(echo "$OUTPUT" | grep -iE "^score:" | grep -oE "[0-9]+(\.[0-9]+)?" | head -1)
          fi

          echo "Desloppify exit code: $SCAN_EXIT"
          echo "Desloppify score: $SCORE"
          echo "score=$SCORE" >> $GITHUB_OUTPUT

          # Write to step summary
          echo "## Desloppify Quality Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Overall Score: $SCORE/100" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if score exceeds threshold (80)
          if [ -n "$SCORE" ]; then
            SCORE_INT=$(echo "$SCORE" | cut -d'.' -f1)
            if [ "$SCORE_INT" -lt 80 ]; then
              echo "::warning::Desloppify score $SCORE is below 80 threshold"
              echo "Score $SCORE is below 80 threshold - see desloppify output for details" >> $GITHUB_STEP_SUMMARY
            else
              echo "Score $SCORE exceeds 80 threshold ✓" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "$SCAN_EXIT" -ne 0 ]; then
            echo "::error::desloppify exited with $SCAN_EXIT before reporting a score"
            echo "desloppify exited with $SCAN_EXIT before reporting a score" >> $GITHUB_STEP_SUMMARY
            exit "$SCAN_EXIT"
          else
            echo "::warning::Could not extract desloppify score"
          fi

      - name: Show next prioritized items
        run: |
          echo "## Next Priorities" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          desloppify next 2>&1 | head -30 >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Generate documentation table of contents
        run: |
          echo "## Documentation Generation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Generate/update TOC for markdown files using Go-based generator
          for file in README.md CONTRIBUTING.md SECURITY.md docs/*.md; do
            if [ -f "$file" ]; then
              echo "Processing: $file" >> $GITHUB_STEP_SUMMARY
              go run scripts/generate-toc.go "$file" 2>&1 || true
            fi
          done
          
          # Check if TOC was updated
          if git diff --quiet; then
            echo "✓ Documentation TOC is up to date" >> $GITHUB_STEP_SUMMARY
          else
            echo "Updated documentation TOC files:" >> $GITHUB_STEP_SUMMARY
            git diff --stat >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Note: Run 'go run scripts/generate-toc.go <file>' to update table of contents" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check markdown links
        run: |
          pip install markdown-link-check || true
          
          # Check for broken links in markdown files (basic check)
          echo "## Markdown Link Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          BROKEN_LINKS=""
          for file in README.md CONTRIBUTING.md SECURITY.md docs/*.md; do
            if [ -f "$file" ]; then
              # Check for internal file links that might be broken
              INTERNAL_LINKS=$(grep -oP '\[.*?\]\(.*?\.go\)' "$file" 2>/dev/null || true)
              if [ -n "$INTERNAL_LINKS" ]; then
                while IFS= read -r link; do
                  TARGET=$(echo "$link" | grep -oP '\(.*?\.go\)' | tr -d '()')
                  if [ -n "$TARGET" ] && [ ! -f "$TARGET" ]; then
                    BROKEN_LINKS="$BROKEN_LINKS\n$file: $TARGET"
                  fi
                done <<< "$INTERNAL_LINKS"
              fi
            fi
          done
          
          if [ -n "$BROKEN_LINKS" ]; then
            echo "Potential issues found:" >> $GITHUB_STEP_SUMMARY
            echo "```" >> $GITHUB_STEP_SUMMARY
            echo -e "$BROKEN_LINKS" >> $GITHUB_STEP_SUMMARY
            echo "```" >> $GITHUB_STEP_SUMMARY
          else
            echo "✓ No broken internal file links detected" >> $GITHUB_STEP_SUMMARY
          fi
