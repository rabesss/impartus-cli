name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  review:
    name: PR Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run golangci-lint with reviewdog
        uses: reviewdog/action-golangci-lint@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          golangci_lint_flags: "--config=.golangci.yml --timeout=5m"
          reporter: github-pr-review
          filter_mode: diff_context
          fail_on_error: true

      - name: Run go vet with reviewdog
        uses: reviewdog/action-govet@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: diff_context
          fail_on_error: false

      - name: Check for TODO/FIXME tech debt
        run: |
          echo "## Tech Debt Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TODOS=$(grep -r --include="*.go" -l "TODO:\|FIXME:\|BUG:\|HACK:" . 2>/dev/null | grep -v vendor | head -20 || true)
          if [ -n "$TODOS" ]; then
            echo "Files with tech debt markers:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$TODOS" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "No tech debt markers found." >> $GITHUB_STEP_SUMMARY
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run tests with coverage
        run: |
          go test ./... -v -cover -coverprofile=coverage.out -timeout 5m -json > test-results.json
          
          # Extract and display coverage summary
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tail -1 >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Show test timing
          echo "### Test Timing" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          go test ./... -v -timeout 5m 2>&1 | grep -E "^(PASS|FAIL|ok|---)" | head -30 >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          # Enforce minimum coverage threshold (40%)
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 40" | bc)" -eq 1 ]; then
            echo "::warning::Coverage ${COVERAGE}% is below 40% threshold"
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          name: impartus-cli-coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Run go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: go build -o impartus .

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install desloppify
        run: python3 -m pip install --user --upgrade "desloppify[full]==0.9.12"

      - name: Run desloppify quality gate
        id: desloppify
        run: |
          # Run desloppify scan and capture output
          OUTPUT=$(desloppify scan --path . 2>&1)
          echo "$OUTPUT"
          
          # Extract overall score from output
          # Look for patterns like "Overall Score: XX/100" or "Score: XX"
          SCORE=$(echo "$OUTPUT" | grep -i "overall" | grep -oE "[0-9]+(\.[0-9]+)?/100" | head -1 | cut -d'/' -f1)
          if [ -z "$SCORE" ]; then
            SCORE=$(echo "$OUTPUT" | grep -iE "^score:" | grep -oE "[0-9]+(\.[0-9]+)?" | head -1)
          fi
          
          echo "Desloppify score: $SCORE"
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          
          # Write to step summary
          echo "## Desloppify Quality Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Overall Score: $SCORE/100" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if score exceeds threshold (80)
          if [ -n "$SCORE" ]; then
            SCORE_INT=$(echo "$SCORE" | cut -d'.' -f1)
            if [ "$SCORE_INT" -lt 80 ]; then
              echo "::warning::Desloppify score $SCORE is below 80 threshold"
              echo "Score $SCORE is below 80 threshold - see desloppify output for details" >> $GITHUB_STEP_SUMMARY
            else
              echo "Score $SCORE exceeds 80 threshold ✓" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "::warning::Could not extract desloppify score"
          fi

      - name: Show next prioritized items
        run: |
          echo "## Next Priorities" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          desloppify next 2>&1 | head -30 >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
