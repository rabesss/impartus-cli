# GitHub Issue Labels Configuration
# Run this workflow manually to sync labels to the repository
# Labels follow: priority, type, area, and status categories

name: Sync Labels
on:
  workflow_dispatch: # Manual trigger
  push:
    paths:
      - '.github/labels.yml'
    branches: [main]

permissions:
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      
      - name: Sync labels
        uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d # v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          yaml-file: .github/labels.yml
          skip-delete: false
          dry-run: false
