name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  release-please:
    name: Release Notes Generation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Get version
        id: version
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          TAG="${{ needs.release-please.outputs.tag_name }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Tag: $TAG"

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.release-please.outputs.version }}
          COMMIT: ${{ github.sha }}
        run: |
          EXTENSION=""
          ARCHIVE_EXT="tar.gz"
          if [ "$GOOS" = "windows" ]; then
            EXTENSION=".exe"
            ARCHIVE_EXT="zip"
          fi
          BINARY_NAME="impartus${EXTENSION}"
          ARCHIVE_NAME="impartus_${VERSION}_${GOOS}_${GOARCH}.${ARCHIVE_EXT}"
          BUILD_DIR="$(mktemp -d)"
          DIST_DIR="$(pwd)/dist"
          mkdir -p "$DIST_DIR"
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X github.com/rabesss/impartus-cli/internal/buildinfo.Version=${VERSION} -X github.com/rabesss/impartus-cli/internal/buildinfo.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X github.com/rabesss/impartus-cli/internal/buildinfo.Commit=${COMMIT}" -o "${BUILD_DIR}/${BINARY_NAME}" .
          if [ "$GOOS" = "windows" ]; then
            (
              cd "$BUILD_DIR"
              zip -9 "${DIST_DIR}/${ARCHIVE_NAME}" "${BINARY_NAME}"
            )
          else
            tar -C "$BUILD_DIR" -czf "${DIST_DIR}/${ARCHIVE_NAME}" "${BINARY_NAME}"
          fi
          echo "Built: ${DIST_DIR}/${ARCHIVE_NAME}"
          ls -la "${DIST_DIR}/${ARCHIVE_NAME}"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*
          draft: false
          prerelease: ${{ needs.release-please.outputs.version != '' && contains(needs.release-please.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release-summary:
    name: Create Release Summary
    runs-on: ubuntu-latest
    needs: [release-please, build-release]
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Create Release Summary
        run: |
          echo "## Release ${{ needs.release-please.outputs.tag_name }} Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release notes have been generated and published." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View the release: https://github.com/${{ github.repository }}/releases/tag/${{ needs.release-please.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
