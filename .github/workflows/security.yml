name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Gitleaks results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gitleaks-results
          path: results.sarif
          retention-days: 30

  gosec-security-scan:
    name: Go Security Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1

      - name: Run gosec security scanner
        run: |
          # Run gosec and capture exit code
          set +e
          gosec -fmt json -out=gosec-results.json -stdout ./... 2>&1
          GOSEC_EXIT=$?
          set -e

          echo "gosec exit code: $GOSEC_EXIT"

          # Count high-severity issues
          if [ -f gosec-results.json ]; then
            ISSUES=$(grep -c '"severity"' gosec-results.json 2>/dev/null || echo "0")
            echo "Security issues found: $ISSUES"

            # Fail on high-severity findings
            HIGH_SEV=$(jq -r '.Issues[] | select(.severity == "HIGH" or .severity == "CRITICAL") | .severity' gosec-results.json 2>/dev/null | wc -l)
            if [ "$HIGH_SEV" -gt 0 ]; then
              echo "::error::Found $HIGH_SEV high-severity security issues"
              exit 1
            fi
          fi

          # Upload SARIF for GitHub Security tab (always run regardless of exit code)
          set +e
          gosec -fmt sarif -out=gosec-results.sarif ./... 2>&1
          set -e

      - name: Upload gosec SARIF results
        if: always() && github.event.repository.security_and_analysis.advanced_security.status == 'enabled'
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: gosec-results.sarif
          category: gosec

      - name: Upload gosec results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gosec-results
          path: gosec-results.json
          retention-days: 30

  trivy-scan:
    name: Vulnerability Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,secret,misconfig'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy SARIF results
        if: always() && github.event.repository.security_and_analysis.advanced_security.status == 'enabled'
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run Go vulnerability check
        id: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Run govulncheck and capture output; do not mask exit code
          set +e
          govulncheck ./... 2>&1 | tee govulncheck-results.txt
          GOVULN_EXIT=$?
          set -e
          echo "govulncheck exit code: $GOVULN_EXIT"
          
          # Check for vulnerabilities
          if grep -q "No vulnerabilities found" govulncheck-results.txt; then
            echo "✓ No vulnerabilities found"
          else
            echo "Vulnerabilities detected - see output above"
            # Fail on high-severity findings
            if [ "$GOVULN_EXIT" -ne 0 ]; then
              echo "::error::Vulnerabilities detected by govulncheck"
              exit 1
            fi
          fi

      - name: Upload govulncheck results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: govulncheck-results
          path: govulncheck-results.txt
          retention-days: 30

  security-report:
    name: Security Report Summary
    runs-on: ubuntu-latest
    needs: [secret-scanning, gosec-security-scan, trivy-scan, dependency-audit]
    if: always()
    steps:
      - name: Create Security Report Summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check secret scanning results
          # Note: gitleaks outputs results.sarif (not gitleaks-results.json)
          if [ -f results.sarif ]; then
            LEAKS=$(grep -c '"ruleId"' results.sarif 2>/dev/null || echo "0")
            echo "### Secret Scanning" >> $GITHUB_STEP_SUMMARY
            echo "- Leaks detected: $LEAKS" >> $GITHUB_STEP_SUMMARY
            if [ "$LEAKS" -eq 0 ] || [ "$LEAKS" = "0" ]; then
              echo "✓ No secrets detected" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Secrets detected - review gitleaks-results artifact" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check gosec results
          if [ -f gosec-results.json ]; then
            GOSEC_ISSUES=$(grep -c '"severity"' gosec-results.json 2>/dev/null || echo "0")
            echo "### Go Security Analysis (gosec)" >> $GITHUB_STEP_SUMMARY
            echo "- Issues found: $GOSEC_ISSUES" >> $GITHUB_STEP_SUMMARY
            if [ "$GOSEC_ISSUES" -eq 0 ]; then
              echo "✓ No security issues detected" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Security issues found - view SARIF in GitHub Security tab" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check Trivy results
          if [ -f trivy-results.sarif ]; then
            TRIVY_ISSUES=$(grep -c '"level"' trivy-results.sarif 2>/dev/null || echo "0")
            echo "### Vulnerability Scanning (Trivy)" >> $GITHUB_STEP_SUMMARY
            echo "- Issues found: $TRIVY_ISSUES" >> $GITHUB_STEP_SUMMARY
            if [ "$TRIVY_ISSUES" -eq 0 ]; then
              echo "✓ No vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Vulnerabilities detected - view SARIF in GitHub Security tab" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check govulncheck results
          if [ -f govulncheck-results.txt ]; then
            echo "### Go Vulnerability Check" >> $GITHUB_STEP_SUMMARY
            if grep -q "No vulnerabilities found" govulncheck-results.txt; then
              echo "✓ No Go vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Go vulnerabilities detected - review govulncheck-results artifact" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Full reports available in workflow artifacts." >> $GITHUB_STEP_SUMMARY
          echo "Detailed security findings: https://github.com/${{ github.repository }}/security" >> $GITHUB_STEP_SUMMARY
