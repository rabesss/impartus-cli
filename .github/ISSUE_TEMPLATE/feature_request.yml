name: Feature Request
description: Suggest a new feature or enhancement for the Impartus CLI
title: "[Feature]: "
labels: ["type: feature", "priority: needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see added or improved.
        
  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: Is your feature request related to a problem? Please describe.
      placeholder: "I'm always frustrated when I have to manually select lectures one by one..."
    validations:
      required: true
      
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see
      placeholder: "Add a --all flag to download all lectures in a course at once..."
    validations:
      required: true
      
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: "I currently use a shell script to loop through lectures..."
      
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the CLI would this affect?
      options:
        - CLI commands (download, serve, etc.)
        - API server endpoints
        - Download pipeline/performance
        - Configuration
        - Documentation
        - Other
    validations:
      required: true
      
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or examples about the feature request.
      placeholder: "This would be useful for batch downloading entire courses..."
      
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this feature hasn't been requested
          required: true
        - label: This feature would benefit other users, not just me
          required: false
