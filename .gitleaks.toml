# Gitleaks configuration for secret scanning
# https://github.com/gitleaks/gitleaks

# Allowlist for common false positives
[allowlist]
description = "Allowlisted paths and regexes for test files, documentation, sample configs, and placeholder credentials"
paths = [
    '''^.*_test\.go$''',
    '''^.*\.md$''',
    '''^.*sample\.config\.json$''',
    '''^.*\.env\.example$''',
]
regexes = [
    '''(?i)(example|test|sample|placeholder)''',
    '''(?i)(password|passwd|pwd)\s*[=:]\s*['"]?(your_|my_|test_|sample_)?.*''',
    '''(?i)(api.?key|token)\s*[=:]\s*['"]?(sk_|pk_|test_)?.*''',
]
